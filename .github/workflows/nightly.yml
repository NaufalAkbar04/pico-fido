name: "Build ESP32-S3 (unsigned)"
on:
  workflow_dispatch:

jobs:
  build-esp32:
    name: Build ESP32-S3
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          submodules: 'recursive'
          persist-credentials: false

      - name: Build ESP32
        run: |
          ./workflows/autobuild.sh esp32

      - name: List output files
        if: always()
        run: |
          echo "===== semua file .bin / .uf2 ====="
          find . -type f \( -name "*.bin" -o -name "*.uf2" \) \
            -not -path "*/.git/*" -not -path "*/managed_components/*"
          echo "===== isi folder release ====="
          ls -la release 2>/dev/null || echo "(tidak ada folder release)"
          echo "===== isi folder build ====="
          ls -la build 2>/dev/null || echo "(tidak ada folder build)"

      - name: Upload firmware artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pico-fido-esp32
          path: |
            release/**
            build/**/*.bin
          if-no-files-found: warn

name: "Build ESP32-S3 (unsigned)"
on:
  workflow_dispatch:

jobs:
  build-esp32:
    name: Build ESP32-S3
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          submodules: 'recursive'
          persist-credentials: false

      - name: Build ESP32
        run: |
          ./workflows/autobuild.sh esp32

      - name: List output files
        if: always()
        run: |
          echo "===== cari semua file .bin / .uf2 ====="
          find . -type f \( -name "*.bin" -o -name "*.uf2" \) -not -path "*/.git/*"
          echo "===== isi folder release (kalau ada) ====="
          ls -la release || echo "folder release tidak ada"

      - name: Upload firmware artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pico-fido-esp32
          path: |
            release/**
            **/*.bin
            **/*.uf2
          if-no-files-found: warn
